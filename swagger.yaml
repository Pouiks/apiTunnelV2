openapi: 3.0.3
info:
  title: Mock API - Tunnel Reservation
  version: 2.0.0
  description: >
    API REST mock Node.js + Express pour simuler Snaplogic pendant le developpement.
    Architecture simplifiee : chaque GET /residences/:id retourne la fiche complete
    (typologies, scenarios pricing, offres, admin overlay) en un seul appel.
servers:
  - url: http://localhost:8081
    description: Local mock server
tags:
  - name: Residences
  - name: AdminTR
  - name: Offers
  - name: Reservations

paths:
  /residences:
    get:
      tags: [Residences]
      summary: GetAllResidences
      description: >
        Catalogue global de toutes les residences France (dezoom map).
        Aucun filtre ville — retourne les 10 residences mock.
        Chaque ligne inclut `offerSummaries`.
      responses:
        "200":
          description: Catalogue complet
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResidencesResponse"

  /cities/{cityAlias}/residences:
    get:
      tags: [Residences]
      summary: GetResidencesByCity
      description: >
        Residences d'une ville (filtre sur `cityAlias` ou `city`).
        Ex. `/cities/Paris/residences` retourne les 4 ECLA.
      parameters:
        - in: path
          name: cityAlias
          required: true
          schema:
            type: string
          description: Alias de ville (ex. Paris, Lyon, Toulouse).
      responses:
        "200":
          description: Residences de la ville
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CityResidencesResponse"

  /cities/{cityAlias}/residences/{id}:
    get:
      tags: [Residences]
      summary: GetOneResidence
      description: >
        Fiche residence complete en un seul appel.
        Inclut `typologyScenarios` (STANDARD, EARLY_BIRD, HIGH_DEMAND avec pricing/options),
        `adminOverlay` (surcouche back-office), `offerSummaries`, `offers` et `offersContext`.
        Le front charge et cache cette reponse pour alimenter tout le tunnel.
      parameters:
        - in: path
          name: cityAlias
          required: true
          schema:
            type: string
          description: Alias de ville (alimente les etats in-app).
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: UUID de la residence (ex. 19f2179b-7d14-f011-998a-6045bd1919a1).
      responses:
        "200":
          description: Fiche residence complete
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResidenceDetail"
        "404":
          description: Residence introuvable
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  cityAlias:
                    type: string
                  residenceId:
                    type: string

  /admin-tr:
    get:
      tags: [AdminTR]
      summary: GetInformationAdminTR
      description: >
        Configuration du tunnel de reservation geree par l'espace admin.
        Sans query param : retourne uniquement `modals` + `steps` (config globale, boot).
        Avec `?city=` : retourne en plus `residenceOverrides` — flags marketing et photos
        filtrees sur la ville demandee (match sur `city` ou `cityAlias`).
      parameters:
        - in: query
          name: city
          required: false
          schema:
            type: string
          description: >
            Alias de ville (ex. Paris, Lyon). Si fourni, la reponse inclut
            `residenceOverrides` avec les flags et photos des residences de cette ville.
      responses:
        "200":
          description: Configuration admin tunnel (+ overrides si city fourni)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminTRResponse"

  /offers:
    get:
      tags: [Offers]
      summary: GetOffers
      description: >
        Referentiel offres global (vue Fabric / outils). Pour le tunnel React,
        privilegier `offerSummaries` et `offers` sur GET /residences et GET /residences/:id.
      parameters:
        - in: query
          name: city
          required: false
          schema:
            type: string
        - in: query
          name: bookingDate
          required: false
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Liste des offres
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OffersResponse"

  /reservations:
    post:
      tags: [Reservations]
      summary: Creation opportunite ECCO
      description: |
        Simule la creation d'une opportunite dans le CRM ECCO.
        Le query param `scenario` selectionne le fichier mock a retourner.
        Defaut : `locataire_seul_majeur`.
      parameters:
        - in: query
          name: scenario
          required: false
          schema:
            type: string
            enum:
              - locataire_seul_majeur
              - multi_locataire_majeur_garant_physique
              - locataire_seul_mineur_garant_physique
              - multi_locataire_dont_1_mineur
              - multi_locataire_majeur_garant_moral
              - multi_locataire_1_mineur_garant_moral
          description: Scenario de creation (defaut locataire_seul_majeur).
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200":
          description: Opportunite creee
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpportunityCreationResponse"

components:
  schemas:
    Coordinates:
      type: object
      properties:
        lat:
          type: number
          format: double
        lng:
          type: number
          format: double
      required: [lat, lng]

    TypologyPreview:
      type: object
      properties:
        typologyCode:
          type: string
          example: STUDIO
        label:
          type: string
          example: Studio
        baseRent:
          type: number
        lowestUnitPrice:
          type: number
      required: [typologyCode, label, baseRent, lowestUnitPrice]

    Floors:
      type: object
      properties:
        min:
          type: integer
        max:
          type: integer
      required: [min, max]

    ResidenceTag:
      type: object
      nullable: true
      properties:
        code:
          type: string
          enum: [POPULAR, SPECIAL_OFFER, NEW, LAST_UNITS]
        label:
          type: string
      required: [code, label]

    ResidencePhoto:
      type: object
      properties:
        url:
          type: string
          format: uri
        alt:
          type: string
        order:
          type: integer
        context:
          type: string
          enum: [HERO, COMMON, TYPOLOGY]
        typologyCode:
          type: string
          nullable: true
          description: Present uniquement si context = TYPOLOGY.
      required: [url, alt, order, context]

    ResidenceListItem:
      type: object
      properties:
        residenceId:
          type: string
        residenceCode:
          type: string
        name:
          type: string
        commercialName:
          type: string
          description: Nom commercial de la residence (peut differer du nom technique).
        brand:
          type: string
          enum: [ECLA, UXCO STUDENT]
        city:
          type: string
        cityAlias:
          type: string
          description: Alias de ville pour le front (ECLA => Paris).
        address:
          type: string
        coordinates:
          $ref: "#/components/schemas/Coordinates"
        availabilityStatus:
          type: string
        baseRentFrom:
          type: number
        tag:
          $ref: "#/components/schemas/ResidenceTag"
        typologyTags:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/ResidenceTag"
          description: Un tag par typologyCode (max un actif par typologie).
        photos:
          type: array
          items:
            $ref: "#/components/schemas/ResidencePhoto"
        typologies:
          type: array
          items:
            $ref: "#/components/schemas/TypologyPreview"
        floors:
          $ref: "#/components/schemas/Floors"
        features:
          type: array
          items:
            type: string
        offerSummaries:
          type: array
          items:
            $ref: "#/components/schemas/OfferSummary"
      required:
        - residenceId
        - residenceCode
        - name
        - commercialName
        - brand
        - city
        - cityAlias
        - address
        - coordinates
        - availabilityStatus
        - baseRentFrom
        - tag
        - typologyTags
        - photos
        - typologies
        - floors
        - features
        - offerSummaries

    OffersContext:
      type: object
      description: Metadonnees communes au referentiel offres (alignement cache).
      properties:
        bookingDate:
          type: string
          format: date
        city:
          type: string
      required: [bookingDate, city]

    OfferSummary:
      type: object
      properties:
        offerCode:
          type: string
        label:
          type: string
        badge:
          type: string
          nullable: true
        type:
          type: string
        promoCode:
          type: string
          nullable: true
        bookingDeadline:
          type: string
          format: date
          nullable: true
        discountTarget:
          type: string
          nullable: true
        discountAmount:
          type: number
          nullable: true
        discountReductionType:
          type: string
          nullable: true
        billingTiming:
          type: string
          nullable: true
      required: [offerCode, label, type]

    ResidencesResponse:
      type: object
      description: Catalogue global (GET /residences) — toutes les residences France.
      properties:
        offersContext:
          $ref: "#/components/schemas/OffersContext"
        residences:
          type: array
          items:
            $ref: "#/components/schemas/ResidenceListItem"
      required: [offersContext, residences]

    CityResidencesResponse:
      type: object
      description: Residences d'une ville (GET /cities/{cityAlias}/residences).
      properties:
        cityAlias:
          type: string
        offersContext:
          $ref: "#/components/schemas/OffersContext"
        residences:
          type: array
          items:
            $ref: "#/components/schemas/ResidenceListItem"
      required: [cityAlias, offersContext, residences]

    CommonAmenity:
      type: object
      properties:
        code:
          type: string
        label:
          type: string
      required: [code, label]

    TypologyDetail:
      type: object
      properties:
        typologyCode:
          type: string
        label:
          type: string
        surface:
          type: number
        baseRent:
          type: number
        lowestUnitPrice:
          type: number
        highestUnitPrice:
          type: number
      required:
        - typologyCode
        - label
        - surface
        - baseRent
        - lowestUnitPrice
        - highestUnitPrice

    Pricing:
      type: object
      properties:
        baseRent:
          type: number
        lowestUnitPrice:
          type: number
        highestUnitPrice:
          type: number
        applicationFee:
          type: number
        securityDeposit:
          type: number
      required: [baseRent, lowestUnitPrice, highestUnitPrice, applicationFee, securityDeposit]

    Amenity:
      type: object
      properties:
        code:
          type: string
        label:
          type: string
      required: [code, label]

    OptionVariant:
      type: object
      properties:
        variantCode:
          type: string
        label:
          type: string
        description:
          type: string
          nullable: true
        amount:
          type: number
        billingTiming:
          type: string
        isDefault:
          type: boolean
        productCode:
          type: string
          nullable: true
        accountingDestinationCode:
          type: string
          nullable: true
      required: [variantCode, label, amount, billingTiming, isDefault]

    OptionGroup:
      type: object
      properties:
        groupCode:
          type: string
        label:
          type: string
        icon:
          type: string
          nullable: true
        variants:
          type: array
          items:
            $ref: "#/components/schemas/OptionVariant"
      required: [groupCode, label, variants]

    TypologyWithPricing:
      type: object
      properties:
        typologyCode:
          type: string
        label:
          type: string
        pricing:
          $ref: "#/components/schemas/Pricing"
        productCode:
          type: string
          nullable: true
        amenities:
          type: array
          items:
            $ref: "#/components/schemas/Amenity"
        optionGroups:
          type: array
          items:
            $ref: "#/components/schemas/OptionGroup"
      required: [typologyCode, label, pricing, amenities, optionGroups]

    TypologyScenario:
      type: object
      description: >
        Payload typologies/pricing/options pour un scenario donne (STANDARD, EARLY_BIRD, HIGH_DEMAND).
      properties:
        residenceId:
          type: string
        scenario:
          type: string
          enum: [STANDARD, EARLY_BIRD, HIGH_DEMAND]
        startDate:
          type: string
          format: date
        bookingDate:
          type: string
          format: date
        typologies:
          type: array
          items:
            $ref: "#/components/schemas/TypologyWithPricing"
        floors:
          $ref: "#/components/schemas/Floors"
      required: [residenceId, scenario, startDate, bookingDate, typologies]

    TypologyScenarios:
      type: object
      description: >
        Les 3 scenarios de pricing embarques dans la fiche residence.
        Le front selectionne le scenario adapte (bookingDate, promo, etc.).
      properties:
        STANDARD:
          $ref: "#/components/schemas/TypologyScenario"
        EARLY_BIRD:
          $ref: "#/components/schemas/TypologyScenario"
        HIGH_DEMAND:
          $ref: "#/components/schemas/TypologyScenario"
      required: [STANDARD, EARLY_BIRD, HIGH_DEMAND]

    AdminOverlay:
      type: object
      description: Surcouche back-office / ERP embarquee dans la fiche residence.
      properties:
        managementCompany:
          type: string
        contractType:
          type: string
        internalContactEmail:
          type: string
        lastAuditDate:
          type: string
          format: date
        complianceStatus:
          type: string
        operatorNotes:
          type: string
          nullable: true

    ResidenceDetail:
      type: object
      description: >
        Fiche complete residence : infos generales, typologies avec pricing par scenario,
        surcouche admin, offres completes et contexte offres. Un seul appel pour le tunnel.
      properties:
        residenceId:
          type: string
        residenceCode:
          type: string
        name:
          type: string
        commercialName:
          type: string
        brand:
          type: string
          enum: [ECLA, UXCO STUDENT]
        city:
          type: string
        cityAlias:
          type: string
        address:
          type: string
        coordinates:
          $ref: "#/components/schemas/Coordinates"
        availabilityStatus:
          type: string
        description:
          type: string
        tag:
          $ref: "#/components/schemas/ResidenceTag"
        typologyTags:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/ResidenceTag"
        photos:
          type: array
          items:
            $ref: "#/components/schemas/ResidencePhoto"
        commonAmenities:
          type: array
          items:
            $ref: "#/components/schemas/CommonAmenity"
        features:
          type: array
          items:
            type: string
        typologies:
          type: array
          items:
            $ref: "#/components/schemas/TypologyDetail"
        floors:
          $ref: "#/components/schemas/Floors"
        typologyScenarios:
          $ref: "#/components/schemas/TypologyScenarios"
        adminOverlay:
          $ref: "#/components/schemas/AdminOverlay"
        offersContext:
          $ref: "#/components/schemas/OffersContext"
        offerSummaries:
          type: array
          items:
            $ref: "#/components/schemas/OfferSummary"
        offers:
          type: array
          items:
            $ref: "#/components/schemas/Offer"
      required:
        - residenceId
        - residenceCode
        - name
        - commercialName
        - brand
        - city
        - cityAlias
        - address
        - coordinates
        - availabilityStatus
        - description
        - tag
        - typologyTags
        - photos
        - commonAmenities
        - features
        - typologies
        - floors
        - typologyScenarios
        - adminOverlay
        - offersContext
        - offerSummaries
        - offers

    OfferScope:
      type: object
      properties:
        residences:
          type: array
          items:
            type: string
        typologies:
          type: array
          items:
            type: string
      required: [residences, typologies]

    OfferConditions:
      type: object
      properties:
        bookingDeadline:
          type: string
          format: date
          nullable: true
        startDateFrom:
          type: string
          format: date
          nullable: true
        startDateTo:
          type: string
          format: date
          nullable: true
        minDurationMonths:
          type: integer
          nullable: true
      required: [bookingDeadline, startDateFrom, startDateTo, minDurationMonths]

    OfferDiscount:
      type: object
      properties:
        target:
          type: string
        reductionType:
          type: string
        amount:
          type: number
        billingTiming:
          type: string
        recurrenceMonths:
          type: integer
          nullable: true
      required: [target, reductionType, amount, billingTiming]

    OfferAccounting:
      type: object
      properties:
        productCode:
          type: string
        accountingDestinationCode:
          type: string
      required: [productCode, accountingDestinationCode]

    Offer:
      type: object
      properties:
        offerCode:
          type: string
        label:
          type: string
        badge:
          type: string
          nullable: true
        promoCode:
          type: string
          nullable: true
        scope:
          $ref: "#/components/schemas/OfferScope"
        conditions:
          $ref: "#/components/schemas/OfferConditions"
        discount:
          $ref: "#/components/schemas/OfferDiscount"
        accounting:
          $ref: "#/components/schemas/OfferAccounting"
        type:
          type: string
      required:
        - offerCode
        - label
        - promoCode
        - scope
        - conditions
        - discount
        - accounting
        - type

    OffersResponse:
      type: object
      properties:
        bookingDate:
          type: string
          format: date
        city:
          type: string
        offers:
          type: array
          items:
            $ref: "#/components/schemas/Offer"
      required: [bookingDate, city, offers]

    ModalInfoBox:
      type: object
      properties:
        icon:
          type: string
        content:
          type: string
      required: [icon, content]

    ModalSection:
      type: object
      properties:
        icon:
          type: string
        title:
          type: string
        description:
          type: string
          description: Peut contenir du HTML inline (strong, em).
        listHeading:
          type: string
        listItems:
          type: array
          items:
            type: string
        infoBox:
          $ref: "#/components/schemas/ModalInfoBox"
      required: [icon, title, description, listItems]

    ModalLocalized:
      type: object
      properties:
        title:
          type: string
        subtitle:
          type: string
        sections:
          type: array
          items:
            $ref: "#/components/schemas/ModalSection"
      required: [title, subtitle, sections]

    Modal:
      type: object
      properties:
        step:
          type: integer
        trigger:
          type: string
          description: Evenement declencheur (ex. EXPRESS_BOOKING_CLICK, PAYMENT_STEP_ENTER).
        fr:
          $ref: "#/components/schemas/ModalLocalized"
        en:
          $ref: "#/components/schemas/ModalLocalized"
      required: [step, trigger, fr, en]

    TunnelStepLocalized:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
      required: [title, description]

    TunnelStep:
      type: object
      properties:
        stepCode:
          type: string
        order:
          type: integer
        fr:
          $ref: "#/components/schemas/TunnelStepLocalized"
        en:
          $ref: "#/components/schemas/TunnelStepLocalized"
      required: [stepCode, order, fr, en]

    ResidenceOverrideFlag:
      type: object
      description: >
        Flag marketing attribue via l'admin. Heritage parent-enfant :
        si `typologies` est vide ou absent, toutes les typologies de la residence heritent du flag.
        Si `typologies` est renseigne, seules ces typologies le portent.
      properties:
        code:
          type: string
          enum: [POPULAR, SPECIAL_OFFER, NEW, LAST_UNITS]
        label:
          type: string
        typologies:
          type: array
          items:
            type: string
          description: >
            Codes typo cibles (ex. STUDIO, T2). Vide = toutes les typologies heritent.
      required: [code, label]

    ResidenceOverride:
      type: object
      description: >
        Surcouche admin pour une residence : flag marketing et photos.
        Les photos remplacent integralement celles de la masterdata.
      properties:
        residenceId:
          type: string
        city:
          type: string
        cityAlias:
          type: string
        flag:
          $ref: "#/components/schemas/ResidenceOverrideFlag"
        photos:
          type: array
          items:
            $ref: "#/components/schemas/ResidencePhoto"
      required: [residenceId, city, cityAlias]

    AdminTRResponse:
      type: object
      description: >
        Configuration du tunnel de reservation.
        Modals bilingues par step+trigger, steps informatifs.
        `residenceOverrides` n'est present que si le query param `city` est fourni.
      properties:
        modals:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/Modal"
        steps:
          type: array
          items:
            $ref: "#/components/schemas/TunnelStep"
        residenceOverrides:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/ResidenceOverride"
          description: >
            Cle = residenceId (UUID). Present uniquement si query param `city` fourni.
            Contient les flags et photos admin des residences de la ville demandee.
      required: [modals, steps]

    PicklistValue:
      type: object
      properties:
        value:
          type: integer
        label:
          type: string

    Contact:
      type: object
      description: |
        Contact CRM. Le tableau `contacts[]` est dynamique : seuls les contacts
        effectivement renseignes sont inclus (pas de slots vides avec null).
        Le champ `uxc_role` porte la picklist ECCO (uxc_role) qui determine le role
        du contact dans l'opportunite. Valeurs disponibles :
          944800000 Locataire (1er locataire)
          944800005 Co-locataire (2e locataire, bail multi)
          944800003 Representant Legal Locataire (locataire 1 mineur)
          944800011 Representant Legal 2 Locataire (locataire 2 mineur)
        Les garants (physique/moral) ne sont pas des contacts dans le payload —
        ils sont geres via typeDeGarant sur l opportunity.
        Tous les champs ci-dessous sont obligatoires sur chaque contact (pas de null).
      properties:
        uxc_role:
          $ref: "#/components/schemas/PicklistValue"
          description: >
            Role ECCO du contact. Valeurs : 944800000 Locataire,
            944800005 Co-locataire, 944800003 Representant Legal Locataire,
            944800011 Representant Legal 2 Locataire.
        prenom:
          type: string
        nom:
          type: string
        email:
          type: string
          format: email
        telephone:
          type: string
        dateDeNaissance:
          type: string
          format: date
        lieuDeNaissance:
          type: string
        nationalite:
          type: string
          description: GUID pays (Dataverse) ou code pays selon integration.
        pays:
          type: string
          description: GUID pays (Dataverse) ou code pays selon integration.
        mineur:
          $ref: "#/components/schemas/PicklistValue"
        profilLocataire:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/PicklistValue"
          description: >
            Profil locataire (picklist aps_profillocataire). Absent pour les contacts
            `uxc_role` Representant Legal Locataire (944800003) ou
            Representant Legal 2 Locataire (944800011) — ce profil n'est pas collecte.
        langueDeCommunication:
          $ref: "#/components/schemas/PicklistValue"
        adresse:
          type: string
        codePostal:
          type: string
        ville:
          type: string
      required:
        - uxc_role
        - prenom
        - nom
        - email
        - telephone
        - dateDeNaissance
        - lieuDeNaissance
        - nationalite
        - pays
        - mineur
        - langueDeCommunication
        - adresse
        - codePostal
        - ville

    Produit:
      type: object
      description: Logement selectionne par le client (reference produit ECCO).
      properties:
        productId:
          type: string
          description: GUID du produit dans ECCO.
        productName:
          type: string
          description: Libelle du logement (ex. Studio 20m² - 3ème étage).
        quantity:
          type: integer
          example: 1
      required: [productId, productName, quantity]

    OffreItem:
      type: object
      description: >
        Entree dans le tableau `offres` de l'opportunity.
        Le champ `type` discrimine l'offre standard (`offre`) du code promo (`code_promo`).
        Les champs `codePromo` et `etat` sont toujours presents :
        null pour une offre standard, renseignes pour un code promo.
      properties:
        type:
          type: string
          enum: [offre, code_promo]
          description: Discriminant — offre automatique ou code promo saisi par le client.
        offreId:
          type: string
          example: OFFER_SUMMER_2026
        nom:
          type: string
        montant:
          type: number
          description: Valeur de la reduction (ex. 50.00).
        typeReduction:
          type: string
          enum: [EUR, PERCENT]
          description: EUR = montant fixe, PERCENT = pourcentage.
        cible:
          type: string
          enum: [loyer, frais_de_dossier, depot_de_garantie]
          description: Sur quoi porte la reduction.
        recurrence:
          type: string
          enum: [unique, mensuelle]
        recurrenceMois:
          type: integer
          nullable: true
          description: Nombre de mois si mensuelle. Null si unique.
        dateDebut:
          type: string
          format: date
        dateFin:
          type: string
          format: date
        codePromo:
          type: string
          nullable: true
          description: Code saisi par le client. Null si type=offre.
          example: FDD50
        etat:
          type: string
          nullable: true
          enum: [valide, invalide]
          description: Etat de validation du code promo. Null si type=offre.
      required: [type, offreId, nom, montant, typeReduction, cible, recurrence, dateDebut, dateFin, codePromo, etat]

    OpportunityDetail:
      type: object
      description: |
        Payload exhaustif a taille fixe. Tous les champs sont toujours presents.
        Les champs non applicables valent `null`.
      properties:
        typeDopportunite:
          $ref: "#/components/schemas/PicklistValue"
        source:
          $ref: "#/components/schemas/PicklistValue"
        marqueDeLaResidence:
          $ref: "#/components/schemas/PicklistValue"
        residenceId:
          type: string
          format: uuid
        residenceName:
          type: string
        typeDeLot:
          type: string
        typeDeBail:
          $ref: "#/components/schemas/PicklistValue"
        typeDeLogementSouhaitee:
          $ref: "#/components/schemas/PicklistValue"
        contractType:
          $ref: "#/components/schemas/PicklistValue"
        salesChannel:
          $ref: "#/components/schemas/PicklistValue"
        dateArrivee:
          type: string
          format: date
        dateDepart:
          type: string
          format: date
        statutDeLopportunite:
          $ref: "#/components/schemas/PicklistValue"
        necessiteDeGarant:
          $ref: "#/components/schemas/PicklistValue"
          description: >
            Indique si un garant est requis. Les equipes sales gerent
            le detail garant apres la pre-reservation.
        typeDeGarant:
          $ref: "#/components/schemas/PicklistValue"
          description: Physique ou Moral. Suffit pour la pre-reservation.
        depotDeGarantie:
          type: number
        fraisDeDossiers:
          type: number
        montant1erPaiement:
          type: number
        parkingSeul:
          $ref: "#/components/schemas/PicklistValue"
        libelleopportunite:
          type: string
        options:
          type: array
          items:
            type: string
          description: Options selectionnees par le client (ex. Balcon, Climatisation). ECCO gere les prix.
        abonnements:
          type: array
          items:
            type: string
          description: Abonnements selectionnes par le client (ex. Le pack, TV, Kit Linge). ECCO gere les prix.
        offres:
          type: array
          description: >
            Offres et codes promo appliques par le client. Tableau vide si aucune offre.
            Chaque entree a un `type` (offre | code_promo) pour discriminer.
          items:
            $ref: "#/components/schemas/OffreItem"

    OpportunityScenarioPayload:
      type: object
      description: |
        Payload de creation opportunite ECCO.
        `contacts[]` est dynamique : seuls les contacts renseignes sont inclus.
        Chaque contact porte un `uxc_role` (picklist ECCO) qui determine son role.
        Les garants ne sont pas des contacts — ils sont captures via
        `necessiteDeGarant` et `typeDeGarant` sur l opportunity.
      properties:
        contacts:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/Contact"
        opportunity:
          $ref: "#/components/schemas/OpportunityDetail"
      required: [contacts, opportunity]

    OpportunityCreationResponse:
      type: object
      properties:
        status:
          type: string
          example: ACCEPTED
        opportunityId:
          type: string
          example: OPP-M1A2B3C4
        scenario:
          type: string
          example: locataire_seul_majeur
        availableScenarios:
          type: array
          items:
            type: string
        submittedPayload:
          $ref: "#/components/schemas/OpportunityScenarioPayload"
        confirmation:
          $ref: "#/components/schemas/ReservationConfirmation"
      required: [status, opportunityId, scenario, availableScenarios, submittedPayload, confirmation]

    ReservationConfirmation:
      type: object
      properties:
        status:
          type: string
          example: ACCEPTED
        quoteRequestId:
          type: string
          example: BQ-2026-000123
        eccoOpportunityId:
          type: string
          example: OPP-2026-XXXXX
        message:
          type: string
          example: Reservation creee avec succes dans ECCO.
